<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
</head>
<body>
    <h1>Busca Filmes</h1>
    <label for="busca">Busca</label>
    <input type="text" id="busca">
    <button id="button">Buscar</button>

    <div class="resultado"></div>

    <script>
        const apikey = "f77bfada";

        button.addEventListener("click", ()=>{
            let str = document.getElementById("busca").value;
            fetch(`http://www.omdbapi.com/?apikey=${apikey}&s=${str}`);
        });
    </script>
</body>
