<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6a-display</title>
    <style>
    *{
        padding: 0px;
        margin: 0px;
        border: 0px;
    }
    .tam{
        height: 100vh;
        width: 100vw;
    }
    #box1{background-color: purple; height: 25vh; }
    #box2{background-color: green; height: 25vh;}
    #box3{background-color: red; height: 25vh;}
    #box4{background-color: yellow; height: 25vh;}

    </style>
</head>
<body>
    <!--O display está em block. A div ocupa toda a linha fazendo os elementos ficarem um em baixo do ouro-->
    <div class="tam">
        <div id="box1">1</div>
        <div id="box2">2</div>
        <div id="box3">3</div>
        <div id="box4">4</div>
    </div>
</body>
</html>
