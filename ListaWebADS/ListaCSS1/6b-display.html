<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6b-display</title>
    <style>
    *{
        padding: 0px;
        margin: 0px;
        border: 0px;
    }
    .tam{
        display: flex;
        flex-direction: row;
        height: 100vh;
        width: 100vw;
    }
    #box1{background-color: purple;flex-grow: 1;}
    #box2{background-color: green;flex-grow: 1;}
    #box3{background-color: red;flex-grow: 1;}
    #box4{background-color: yellow;flex-grow: 1;}

    </style>
</head>
<body>
    <!--Display flex e flex-direction faz os elementos ficarem um do lado do outro-->
    <div class="tam">
        <div id="box1">1</div>
        <div id="box2">2</div>
        <div id="box3">3</div>
        <div id="box4">4</div>
    </div>
</body>
</html>
