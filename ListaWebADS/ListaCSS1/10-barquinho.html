<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barquinho</title>
    <style>
    *{
        padding: 0px;
        margin: 0px;
        border: 0px;
    }
    .conteiner{
        height: 100vh;
        width: 100vw;
        background: linear-gradient(to top, rgba(47, 213, 255, 0.5), rgba(47, 213, 255, 0.2));
    }
    #nuvem{
        position: absolute;
        height: 70px;
        width: 170px;
        background-color: white;
        border-radius: 50%;
        box-shadow: -3px 3px 0px 1px rgba(0,0,0,0.3);
        top: 15%;
        animation: nuvem linear 30s infinite;
    }
    @keyframes nuvem {
        0%{
            left: -20%;
        }
        100%{
            left: 100%;
        }
        
    }
    #barco{
        position: absolute;
        width: 120px;
        height: 120px;
        background-image: url("barco.png");
        background-size: cover;
        transform: scaleX(-1);
        animation: barco linear 20s infinite;
        
    }
    @keyframes barco {
        0%{left: -20%; top:50vh;}
        50%{top:45vh;}
        100%{left:120%; top:50vh;}        
    }
    #mar{
        position: absolute;
        bottom: 0%;
        width: 100%;
        height: 35vh;
        background-color: rgb(0,0,200,0.6);
        animation: onda linear 20s infinite;
    }

    @keyframes onda {
        0%{height: 35vh;}
        50%{height: 40vh;}
        100%{height: 35vh;}
    }
    </style>
</head>
<body>
    <div class="conteiner">
        <div id="nuvem"></div>
        <div id="barco"></div>
        <div id="mar"></div>
    </div>
</body>
</html>
