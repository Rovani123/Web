<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
    *{
        padding: 0px;
        margin: 0px;
        border: 0px;
    }
    .calc{
        display: grid;
        width: 100vh;
        height: 100vh;
        grid-template-areas: 
        "tela tela tela tela"
        "mais menos vezes dividir"
        "n7 n8 n9 ok"
        "n4 n5 n6 ok"
        "n1 n2 n3 ok"
        "n0 virg limpa ok"
        ;
    }
    .calc>*{
        border: 1px solid black; 
        margin: 1px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
    }
    #tela{grid-area: tela; justify-content: end; }
    #mais{grid-area: mais;}
    #menos{grid-area: menos;}
    #vezes{grid-area: vezes;}
    #dividir{grid-area: dividir;}
    #n7{grid-area: n7;}
    #n8{grid-area: n8;}
    #n9{grid-area: n9;}
    #n4{grid-area: n4;}
    #n5{grid-area: n5;}
    #n6{grid-area: n6;}
    #n1{grid-area: n1;}
    #n2{grid-area: n2;}
    #n3{grid-area: n3;}
    #n0{grid-area: n0;}
    #virg{grid-area: virg;}
    #limpa{grid-area: limpa;}
    #ok{grid-area: ok; background-color: rgb(89, 165, 236);}
    </style>
</head>
<body>
    <div class="calc">
        <div id="tela"></div>
        <button id="mais">+</button>
        <button id="menos">-</button>
        <button id="vezes">X</button>
        <button id="dividir">/</button>
        <button id="n7">7</button>
        <button id="n8">8</button>
        <button id="n9">9</button>
        <button id="n4">4</button>
        <button id="n5">5</button>
        <button id="n6">6</button>
        <button id="n1">1</button>
        <button id="n2">2</button>
        <button id="n3">3</button>
        <button id="n0">0</button>
        <button id="virg">.</button>
        <button id="limpa">C</button>
        <button id="ok">=</button>
    </div>
    <script>
        let nums=[];
        n0.addEventListener("click", ()=>{
            if(nums!="0"){
                nums.push("0");
                tela.innerHTML +=0;
            }            
        });
        n1.addEventListener("click", ()=>{
            nums.push("1");
            tela.innerHTML +=1;
        });
        n2.addEventListener("click", ()=>{
            nums.push("2");
            tela.innerHTML +=2;
        });
        n3.addEventListener("click", ()=>{
            nums.push("3");
            tela.innerHTML +=3;
        });
        n4.addEventListener("click", ()=>{
            nums.push("4");
            tela.innerHTML +=4;
        });
        n5.addEventListener("click", ()=>{
            nums.push("5");
            tela.innerHTML +=5;
        });
        n6.addEventListener("click", ()=>{
            nums.push("6");
            tela.innerHTML +=6;
        });
        n7.addEventListener("click", ()=>{
            nums.push("1");nums.push("7");
            tela.innerHTML +=7;
        });
        n8.addEventListener("click", ()=>{
            nums.push("8");
            tela.innerHTML +=8;
        });
        n9.addEventListener("click", ()=>{
            nums.push("9");
            tela.innerHTML +=9;
        });
        virg.addEventListener("click", ()=>{
            if((nums!="") && (nums[nums.length-1] != "+") && (nums[nums.length-1] != "-") && (nums[nums.length-1] != "X") && (nums[nums.length-1] != "/")){
                nums.push(".");
                tela.innerHTML +=".";
            }
        });
        limpa.addEventListener("click", ()=>{
            nums.length=0;
            tela.innerHTML ="";
        });
        ok.addEventListener("click", ()=>{
            let str = JSON.stringify(nums);
            tela.innerHTML = eval(nums.join(""));
        });
        mais.addEventListener("click", ()=>{
            if((nums!="") && (nums[nums.length-1] != "+") && (nums[nums.length-1] != "-") && (nums[nums.length-1] != "X") && (nums[nums.length-1] != "/")){
                nums.push("+");
                tela.innerHTML +="+";
            }
        });
        menos.addEventListener("click", ()=>{
            if((nums!="") && (nums[nums.length-1] != "+") && (nums[nums.length-1] != "-") && (nums[nums.length-1] != "X") && (nums[nums.length-1] != "/")){
                nums.push("-");
                tela.innerHTML +="-";
            }
        });
        vezes.addEventListener("click", ()=>{
            if((nums!="") && (nums[nums.length-1] != "+") && (nums[nums.length-1] != "-") && (nums[nums.length-1] != "X") && (nums[nums.length-1] != "/")){
                nums.push("*");
                tela.innerHTML +="X";
            }
        });
        dividir.addEventListener("click", ()=>{
            if((nums!="") && (nums[nums.length-1] != "+") && (nums[nums.length-1] != "-") && (nums[nums.length-1] != "X") && (nums[nums.length-1] != "/")){
                nums.push("/");
                tela.innerHTML +="/";
            }
        });
    </script>
</body>
</html>
