<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>

    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #tela{
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            justify-content: space-around;
        }
        #tela>*{
            flex-grow: 1;
            border: 1px solid black;
            background-position: center;
            background-repeat: no-repeat;
            transition-duration: 1s;
            background-size: 100%;
        }
        #div1{
            display: flex;
            align-items: end;
            justify-content: center;
            background-image: url("img1.jpg");
            background-color: grey;
        }
        #div1:hover{
            flex-grow: 4;
        }
        #div2{
            display: flex;
            align-items: end;
            justify-content: center;
            background-image: url("img2.jpg");
            background-color: yellow;
        }
        #div2:hover{
            flex-grow: 4;
        }
        #div3{
            display: flex;
            align-items: end;
            justify-content: center;
            background-image: url("img3.jpeg");
            background-color: red;
        }
        #div3:hover{
            flex-grow: 4;
        }
        #div4{
            display: flex;
            align-items: end;
            justify-content: center;
            background-image: url("img4.jpg");
            background-color: blue;
        }
        #div4:hover{
            flex-grow: 4;
        }
    </style>
</head>
<body>
    <div id="tela">
        <div id="div1"></div>
        <div id="div2"></div>
        <div id="div3"></div>
        <div id="div4"></div>
    </div>
</body>
</html>
