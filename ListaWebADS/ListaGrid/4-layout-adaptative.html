<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4</title>
    <style>
        .tela>*{
            border: 1px solid black;
            border-collapse: collapse;
        }
        *{padding: 0px; margin: 0px;}
        .tela{
            display: grid;
            height: 100vh;
            width: 100vw;
        }
        @media screen and (max-width:650px){
            .tela{
                display: flex;
                flex-direction: column;
                height: 100vh;
                width: 100vw;
            }
            #main{
                flex-grow: 7;
            }
            .tela>*{
                flex-grow: 1;
            }
        }
        @media screen and (min-width:650px) and (max-width:2000px){
            .tela{
                grid-template-areas: 
                "header header header header header"
                "left banner banner banner right"
                "left main main main right"
                "left main main main right"
                "left main main main right"
                "left low low low right"
                "footer footer footer footer footer";
            }
        }
        
        #hea{background-color: orange; grid-area: header;}
        #ban{background-color: red; grid-area: banner;}
        #left{background-color: green; grid-area: left;}
        #main{background-color: blue; grid-area: main;}
        #right{background-color: orange; grid-area: right;}
        #low{background-color: green; grid-area: low;}
        #footer{background-color: blue; grid-area: footer;}
    </style>
</head>
<body>
    <div class="tela">
        <div id="hea"></div>
        <div id="ban"></div>
        <div id="left"></div>
        <div id="main"></div>
        <div id="right"></div>
        <div id="low"></div>
        <div id="footer"></div>
    </div>
</body>
</html>
