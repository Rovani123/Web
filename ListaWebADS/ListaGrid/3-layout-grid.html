<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3</title>
    <style>
        *{
        padding: 0px;
        margin: 0px;
        border: 0px;
        }
        #tela{
            display: grid;
            grid-template-areas: 
            "d1 d1 d1 d1 d1 d1 d1"
            "d2 d2 d3 d3 d3 d4 d4"
            "d5 d5 d3 d3 d3 d6 d6"
            "d5 d5 d7 d7 d7 d7 d7"
            ;
            height: 100vh;
            width: 100vh;
        }
        #tela>*{
            display: flex;
            justify-content: center;
            border: 1px solid black;
            border-collapse: collapse;
        }
        #d1{ grid-area: d1; background-color: beige;}
        #d2{grid-area: d2; background-color: red;}
        #d3{grid-area: d3; background-color: beige;}
        #d4{grid-area: d4; background-color: red;}
        #d5{grid-area: d5; background-color: beige;}
        #d6{grid-area: d6; background-color: red;}
        #d7{grid-area: d7; background-color: beige;}

    </style>
</head>
<body>
    <div id="tela">
        <div id="d1">1</div>
        <div id="d2">2</div>
        <div id="d3">3</div>
        <div id="d4">4</div>
        <div id="d5">5</div>
        <div id="d6">6</div>
        <div id="d7">7</div>
    </div>
</body>
</html>
